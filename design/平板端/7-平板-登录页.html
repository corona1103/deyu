<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>北大附小AI德育系统 - 登录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #8B0000 0%, #A52A2A 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 顶部装饰 */
        .brand-header {
            padding: 60px 20px 40px;
            text-align: center;
            color: white;
        }

        .brand-logo {
            width: 80px;
            height: 80px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }

        .brand-logo-inner {
            width: 66px;
            height: 66px;
            background: linear-gradient(135deg, #8B0000, #A52A2A);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
            font-weight: bold;
        }

        .brand-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .brand-subtitle {
            font-size: 14px;
            opacity: 0.8;
        }

        /* 登录卡片 */
        .login-container {
            flex: 1;
            background: white;
            border-radius: 30px 30px 0 0;
            padding: 40px 24px;
        }

        .login-title {
            font-size: 22px;
            font-weight: bold;
            color: #333;
            text-align: center;
            margin-bottom: 30px;
        }

        /* 账号切换 */
        .account-switcher {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
            overflow-x: auto;
            padding-bottom: 10px;
        }

        .account-card {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            background: #F8F8F8;
            border-radius: 12px;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.3s;
        }

        .account-card.active {
            border-color: #8B0000;
            background: #FFF5F5;
        }

        .account-avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #FFB6C1, #FFC0CB);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .account-info {
            text-align: left;
        }

        .account-name {
            font-size: 14px;
            font-weight: bold;
            color: #333;
        }

        .account-class {
            font-size: 12px;
            color: #999;
        }

        .add-account {
            flex-shrink: 0;
            width: 50px;
            height: 64px;
            background: #F8F8F8;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: #999;
            cursor: pointer;
        }

        /* 表单 */
        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            color: #333;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-input {
            width: 100%;
            height: 50px;
            border: 1px solid #E0E0E0;
            border-radius: 12px;
            padding: 0 16px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .form-input:focus {
            outline: none;
            border-color: #8B0000;
        }

        .code-input-group {
            display: flex;
            gap: 12px;
        }

        .code-input-group .form-input {
            flex: 1;
        }

        .get-code-btn {
            width: 120px;
            height: 50px;
            background: #8B0000;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            cursor: pointer;
            flex-shrink: 0;
        }

        .get-code-btn:disabled {
            background: #ccc;
        }

        /* 登录方式切换 */
        .login-type-switch {
            text-align: center;
            margin: 20px 0;
        }

        .login-type-switch a {
            color: #8B0000;
            font-size: 14px;
            text-decoration: none;
        }

        /* 登录按钮 */
        .login-btn {
            width: 100%;
            height: 50px;
            background: linear-gradient(135deg, #8B0000, #A52A2A);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 30px;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .login-btn:active {
            transform: scale(0.98);
        }

        /* 协议 */
        .agreement {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            margin-top: 20px;
            font-size: 12px;
            color: #999;
        }

        .agreement input {
            margin-top: 2px;
            accent-color: #8B0000;
        }

        .agreement a {
            color: #8B0000;
            text-decoration: none;
        }

        /* 平板端样式 */
        @media (min-width: 768px) {
            body {
                justify-content: center;
                align-items: center;
                padding: 40px;
            }

            .brand-header {
                padding: 0 0 40px;
            }

            .brand-logo {
                width: 100px;
                height: 100px;
            }

            .brand-logo-inner {
                width: 84px;
                height: 84px;
                font-size: 22px;
            }

            .brand-title {
                font-size: 32px;
            }

            .brand-subtitle {
                font-size: 16px;
            }

            .login-container {
                max-width: 450px;
                width: 100%;
                border-radius: 30px;
                box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            }

            .login-title {
                font-size: 26px;
            }

            .form-input {
                height: 55px;
            }

            .get-code-btn {
                height: 55px;
            }

            .login-btn {
                height: 55px;
            }
        }

        /* 大平板/横屏 */
        @media (min-width: 1024px) {
            .main-wrapper {
                display: flex;
                max-width: 900px;
                width: 100%;
                background: white;
                border-radius: 30px;
                overflow: hidden;
                box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            }

            .brand-section {
                flex: 1;
                background: linear-gradient(135deg, #8B0000 0%, #A52A2A 100%);
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                padding: 60px 40px;
            }

            .brand-header {
                padding: 0;
            }

            .login-container {
                flex: 1;
                border-radius: 0;
                box-shadow: none;
                display: flex;
                flex-direction: column;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <!-- 手机端布局 -->
    <div class="mobile-layout">
        <div class="brand-header">
            <div class="brand-logo">
                <div class="brand-logo-inner">北大</div>
            </div>
            <div class="brand-title">北大附小AI德育系统</div>
            <div class="brand-subtitle">教师版</div>
        </div>

        <div class="login-container">
            <div class="login-title">登录账号</div>

            <!-- 账号切换 -->
            <div class="account-switcher">
                <div class="account-card active">
                    <div class="account-avatar">张</div>
                    <div class="account-info">
                        <div class="account-name">张老师</div>
                        <div class="account-class">三年级1班</div>
                    </div>
                </div>
                <div class="account-card">
                    <div class="account-avatar">李</div>
                    <div class="account-info">
                        <div class="account-name">李老师</div>
                        <div class="account-class">三年级2班</div>
                    </div>
                </div>
                <div class="add-account">+</div>
            </div>

            <!-- 登录表单 -->
            <form>
                <div class="form-group">
                    <label class="form-label">手机号</label>
                    <input type="tel" class="form-input" placeholder="请输入手机号" value="138****8888">
                </div>

                <div class="form-group">
                    <label class="form-label">验证码</label>
                    <div class="code-input-group">
                        <input type="text" class="form-input" placeholder="请输入验证码">
                        <button type="button" class="get-code-btn">获取验证码</button>
                    </div>
                </div>

                <div class="login-type-switch">
                    <a href="#">使用密码登录</a>
                </div>

                <button type="button" class="login-btn" onclick="location.href='8-平板-首页.html'">登 录</button>

                <div class="agreement">
                    <input type="checkbox" checked>
                    <span>登录即表示同意 <a href="#">《用户协议》</a> 和 <a href="#">《隐私政策》</a></span>
                </div>
            </form>
        </div>
    </div>
</body>
</html>

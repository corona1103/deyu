<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, height=1080">
    <title>北大附小AI德育系统 - 系统展示页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 1920px;
            height: 1080px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #8B0000 0%, #A52A2A 50%, #8B0000 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        /* 装饰元素 */
        .decoration {
            position: absolute;
            opacity: 0.1;
        }

        .decoration-1 {
            top: 50px;
            left: 100px;
            width: 200px;
            height: 200px;
            background: white;
            border-radius: 50%;
        }

        .decoration-2 {
            bottom: 100px;
            right: 150px;
            width: 300px;
            height: 300px;
            background: white;
            border-radius: 50%;
        }

        .decoration-3 {
            top: 200px;
            right: 300px;
            width: 150px;
            height: 150px;
            background: white;
            border-radius: 50%;
        }

        .decoration-4 {
            bottom: 200px;
            left: 200px;
            width: 180px;
            height: 180px;
            background: white;
            border-radius: 50%;
        }

        /* 主内容区 */
        .main-content {
            text-align: center;
            z-index: 10;
        }

        /* Logo区域 */
        .logo-container {
            margin-bottom: 40px;
        }

        .school-badge {
            width: 120px;
            height: 120px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .school-badge-inner {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #8B0000, #A52A2A);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            font-weight: bold;
        }

        /* 标题 */
        .title {
            color: white;
            margin-bottom: 20px;
        }

        .title-main {
            font-size: 72px;
            font-weight: bold;
            letter-spacing: 8px;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            margin-bottom: 15px;
        }

        .title-sub {
            font-size: 36px;
            font-weight: 300;
            letter-spacing: 12px;
            opacity: 0.9;
        }

        /* 分隔线 */
        .divider {
            width: 400px;
            height: 3px;
            background: linear-gradient(90deg, transparent, white, transparent);
            margin: 50px auto;
        }

        /* 进入按钮 */
        .enter-btn {
            display: inline-block;
            padding: 25px 80px;
            background: white;
            color: #8B0000;
            font-size: 32px;
            font-weight: bold;
            letter-spacing: 4px;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            text-decoration: none;
        }

        .enter-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.4);
        }

        /* 底部信息 */
        .footer {
            position: absolute;
            bottom: 40px;
            color: white;
            opacity: 0.7;
            font-size: 18px;
            letter-spacing: 2px;
        }

        /* 动画效果 */
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .school-badge {
            animation: float 3s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.1; }
            50% { opacity: 0.15; }
        }

        .decoration {
            animation: pulse 4s ease-in-out infinite;
        }

        .decoration-1 { animation-delay: 0s; }
        .decoration-2 { animation-delay: 1s; }
        .decoration-3 { animation-delay: 2s; }
        .decoration-4 { animation-delay: 3s; }
    </style>
    <script src="scale.js"></script>
</head>
<body>
    <!-- 装饰元素 -->
    <div class="decoration decoration-1"></div>
    <div class="decoration decoration-2"></div>
    <div class="decoration decoration-3"></div>
    <div class="decoration decoration-4"></div>

    <!-- 主内容 -->
    <div class="main-content">
        <div class="logo-container">
            <div class="school-badge">
                <div class="school-badge-inner">北大</div>
            </div>
        </div>

        <div class="title">
            <div class="title-main">北大附小AI德育系统</div>
            <div class="title-sub">MORAL EDUCATION SYSTEM</div>
        </div>

        <div class="divider"></div>

        <a href="2-大屏-登录页.html" class="enter-btn">点击进入</a>
    </div>

    <!-- 底部信息 -->
    <div class="footer">
        北京大学附属小学 | 智慧德育 启迪未来
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, height=1080">
    <title>北大附小AI德育系统 - 首页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 1920px;
            height: 1080px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #8B0000 0%, #A52A2A 100%);
            overflow: hidden;
            padding: 40px 60px;
            display: flex;
            flex-direction: column;
        }

        /* 顶部区域 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .school-badge {
            width: 70px;
            height: 70px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .school-badge-inner {
            width: 58px;
            height: 58px;
            background: linear-gradient(135deg, #8B0000, #A52A2A);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 16px;
            font-weight: bold;
        }

        .header-title {
            color: white;
            font-size: 48px;
            font-weight: bold;
            letter-spacing: 4px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .class-selector {
            background: rgba(255, 255, 255, 0.2);
            padding: 12px 30px;
            border-radius: 30px;
            color: white;
            font-size: 22px;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: background 0.3s;
        }

        .class-selector:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .class-selector select {
            background: transparent;
            border: none;
            color: white;
            font-size: 22px;
            cursor: pointer;
            outline: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
        }

        .class-selector select option {
            color: #333;
            background: white;
        }

        .class-selector::after {
            content: '▼';
            font-size: 12px;
        }

        /* Modal styles */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 50px 60px;
            border-radius: 25px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .modal-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .modal-text {
            font-size: 28px;
            color: #333;
            margin-bottom: 30px;
        }

        .modal-btn {
            padding: 15px 50px;
            background: linear-gradient(135deg, #8B0000, #A52A2A);
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 20px;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .modal-btn:hover {
            transform: translateY(-3px);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            color: white;
            font-size: 20px;
        }

        .user-avatar {
            width: 50px;
            height: 50px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #8B0000;
            font-size: 20px;
        }

        /* 主内容区 */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* 功能卡片区 */
        .function-cards {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 40px;
            padding: 60px 80px;
            display: flex;
            gap: 60px;
            margin-bottom: 50px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
        }

        .function-card {
            width: 220px;
            height: 280px;
            background: white;
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 3px solid #f0f0f0;
            text-decoration: none;
        }

        .function-card:hover {
            transform: translateY(-10px);
            border-color: #8B0000;
            box-shadow: 0 15px 40px rgba(139, 0, 0, 0.2);
        }

        .function-icon {
            width: 100px;
            height: 100px;
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 25px;
            font-size: 48px;
        }

        .function-card:nth-child(1) .function-icon {
            background: linear-gradient(135deg, #FFB6C1, #FFC0CB);
        }

        .function-card:nth-child(2) .function-icon {
            background: linear-gradient(135deg, #87CEEB, #ADD8E6);
        }

        .function-card:nth-child(3) .function-icon {
            background: linear-gradient(135deg, #98D8C8, #B8E6D9);
        }

        .function-title {
            font-size: 36px;
            font-weight: bold;
            color: #8B0000;
            letter-spacing: 4px;
            writing-mode: vertical-rl;
            text-orientation: upright;
        }

        /* 进入点评按钮 */
        .enter-review-btn {
            display: block;
            width: 800px;
            padding: 30px 0;
            background: linear-gradient(90deg, rgba(255,255,255,0.9), white, rgba(255,255,255,0.9));
            border-radius: 50px;
            text-align: center;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .enter-review-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.3);
        }

        .enter-review-text {
            font-size: 42px;
            font-weight: bold;
            color: #8B0000;
            letter-spacing: 8px;
        }

        /* 装饰边框 */
        .btn-decoration {
            position: relative;
        }

        .btn-decoration::before,
        .btn-decoration::after {
            content: '';
            position: absolute;
            width: 80px;
            height: 6px;
            background: #8B0000;
            border-radius: 3px;
            top: 50%;
            transform: translateY(-50%);
        }

        .btn-decoration::before {
            left: 60px;
        }

        .btn-decoration::after {
            right: 60px;
        }

        /* 底部信息 */
        .footer {
            text-align: center;
            color: rgba(255, 255, 255, 0.7);
            font-size: 16px;
            margin-top: 30px;
        }
    </style>
    <script src="scale.js"></script>
</head>
<body>
    <!-- 顶部区域 -->
    <header class="header">
        <div class="header-left">
            <div class="school-badge">
                <div class="school-badge-inner">北大</div>
            </div>
            <h1 class="header-title">北大附小AI德育系统</h1>
        </div>
        <div class="header-right">
            <div class="class-selector">
                <select id="classSelect" onchange="switchClass(this.value)">
                    <option value="3-1">三年级1班</option>
                    <option value="3-2">三年级2班</option>
                    <option value="3-3">三年级3班</option>
                </select>
            </div>
            <div class="user-info">
                <div class="user-avatar">张</div>
                <span>张老师</span>
            </div>
        </div>
    </header>

    <!-- 主内容区 -->
    <main class="main-content">
        <!-- 功能卡片 -->
        <div class="function-cards">
            <a href="5-大屏-排行榜页面.html" class="function-card">
                <div class="function-icon">🏆</div>
                <div class="function-title">排行榜</div>
            </a>
            <a href="6-大屏-交作业页面.html" class="function-card">
                <div class="function-icon">📝</div>
                <div class="function-title">交作业</div>
            </a>
            <a href="#" class="function-card" onclick="showTabletPrompt(event)">
                <div class="function-icon">💬</div>
                <div class="function-title">我想说</div>
            </a>
        </div>

        <!-- 进入点评按钮 -->
        <a href="4-大屏-点评页面.html" class="enter-review-btn btn-decoration">
            <span class="enter-review-text">进入点评</span>
        </a>
    </main>

    <!-- 底部信息 -->
    <footer class="footer">
        北京大学附属小学 | 智慧德育 启迪未来
    </footer>

    <!-- Modal for "我想说" -->
    <div class="modal-overlay" id="tabletModal" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-icon">📱</div>
            <div class="modal-text">请前往老师平板端使用</div>
            <button class="modal-btn" onclick="closeModal()">我知道了</button>
        </div>
    </div>

    <script>
        function switchClass(classId) {
            console.log('切换到班级:', classId);
            // In production, this would reload data for the selected class
        }

        function showTabletPrompt(event) {
            event.preventDefault();
            document.getElementById('tabletModal').classList.add('active');
        }

        function closeModal(event) {
            if (!event || event.target.classList.contains('modal-overlay') || event.target.classList.contains('modal-btn')) {
                document.getElementById('tabletModal').classList.remove('active');
            }
        }
    </script>
</body>
</html>

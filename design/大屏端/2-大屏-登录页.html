<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, height=1080">
    <title>北大附小AI德育系统 - 登录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 1920px;
            height: 1080px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* 左侧品牌区 */
        .brand-section {
            width: 50%;
            height: 100%;
            background: linear-gradient(135deg, #8B0000 0%, #A52A2A 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px;
            position: relative;
            overflow: hidden;
        }

        .brand-decoration {
            position: absolute;
            background: white;
            opacity: 0.1;
            border-radius: 50%;
        }

        .brand-decoration-1 {
            width: 400px;
            height: 400px;
            top: -100px;
            left: -100px;
        }

        .brand-decoration-2 {
            width: 300px;
            height: 300px;
            bottom: -50px;
            right: -50px;
        }

        .brand-logo {
            width: 140px;
            height: 140px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 40px;
            z-index: 10;
        }

        .brand-logo-inner {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #8B0000, #A52A2A);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 28px;
            font-weight: bold;
        }

        .brand-title {
            color: white;
            font-size: 56px;
            font-weight: bold;
            letter-spacing: 6px;
            margin-bottom: 20px;
            z-index: 10;
        }

        .brand-subtitle {
            color: white;
            font-size: 24px;
            opacity: 0.9;
            letter-spacing: 4px;
            z-index: 10;
        }

        /* 右侧登录区 */
        .login-section {
            width: 50%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 60px;
        }

        .login-card {
            width: 600px;
            background: white;
            border-radius: 30px;
            padding: 60px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
        }

        .login-title {
            font-size: 36px;
            font-weight: bold;
            color: #333;
            text-align: center;
            margin-bottom: 50px;
        }

        /* 登录方式切换 */
        .login-tabs {
            display: flex;
            margin-bottom: 40px;
            border-bottom: 2px solid #f0f0f0;
        }

        .login-tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            font-size: 20px;
            color: #999;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
            transition: all 0.3s;
        }

        .login-tab.active {
            color: #8B0000;
            border-bottom-color: #8B0000;
        }

        /* 扫码登录 */
        .qr-login {
            text-align: center;
            padding: 20px;
        }

        .qr-code {
            width: 240px;
            height: 240px;
            background: #f5f5f5;
            border: 2px dashed #ddd;
            border-radius: 20px;
            margin: 0 auto 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .qr-placeholder {
            width: 180px;
            height: 180px;
            background: linear-gradient(45deg, #eee 25%, #fff 25%, #fff 50%, #eee 50%, #eee 75%, #fff 75%);
            background-size: 20px 20px;
            border-radius: 10px;
        }

        .qr-hint {
            font-size: 18px;
            color: #666;
        }

        /* 手机号登录 */
        .phone-login {
            display: none;
        }

        .phone-login.active {
            display: block;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-label {
            display: block;
            font-size: 18px;
            color: #333;
            margin-bottom: 10px;
        }

        .form-input {
            width: 100%;
            height: 60px;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            padding: 0 20px;
            font-size: 20px;
            transition: border-color 0.3s;
        }

        .form-input:focus {
            outline: none;
            border-color: #8B0000;
        }

        .form-select {
            width: 100%;
            height: 60px;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            padding: 0 20px;
            font-size: 20px;
            background: white;
            cursor: pointer;
        }

        .form-select:focus {
            outline: none;
            border-color: #8B0000;
        }

        .code-input-group {
            display: flex;
            gap: 15px;
        }

        .code-input-group .form-input {
            flex: 1;
        }

        .get-code-btn {
            width: 160px;
            height: 60px;
            background: #8B0000;
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 18px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .get-code-btn:hover {
            background: #A52A2A;
        }

        .remember-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 30px;
        }

        .remember-checkbox {
            width: 22px;
            height: 22px;
            accent-color: #8B0000;
        }

        .remember-label {
            font-size: 18px;
            color: #666;
        }

        .login-btn {
            width: 100%;
            height: 65px;
            background: linear-gradient(135deg, #8B0000, #A52A2A);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .login-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(139, 0, 0, 0.3);
        }

        /* 返回链接 */
        .back-link {
            display: block;
            text-align: center;
            margin-top: 30px;
            color: #999;
            font-size: 16px;
            text-decoration: none;
        }

        .back-link:hover {
            color: #8B0000;
        }
    </style>
    <script src="scale.js"></script>
</head>
<body>
    <!-- 左侧品牌区 -->
    <div class="brand-section">
        <div class="brand-decoration brand-decoration-1"></div>
        <div class="brand-decoration brand-decoration-2"></div>
        <div class="brand-logo">
            <div class="brand-logo-inner">北大</div>
        </div>
        <div class="brand-title">北大附小AI德育系统</div>
        <div class="brand-subtitle">智慧德育 启迪未来</div>
    </div>

    <!-- 右侧登录区 -->
    <div class="login-section">
        <div class="login-card">
            <div class="login-title">班主任登录</div>

            <!-- 登录方式切换 -->
            <div class="login-tabs">
                <div class="login-tab active" onclick="switchTab('qr')">扫码登录</div>
                <div class="login-tab" onclick="switchTab('phone')">手机号登录</div>
            </div>

            <!-- 扫码登录 -->
            <div class="qr-login" id="qr-login">
                <div class="qr-code">
                    <div class="qr-placeholder"></div>
                </div>
                <div class="qr-hint">请使用微信扫描二维码登录</div>
            </div>

            <!-- 手机号登录 -->
            <div class="phone-login" id="phone-login">
                <div class="form-group">
                    <label class="form-label">手机号</label>
                    <input type="tel" class="form-input" placeholder="请输入手机号">
                </div>

                <div class="form-group">
                    <label class="form-label">验证码</label>
                    <div class="code-input-group">
                        <input type="text" class="form-input" placeholder="请输入验证码">
                        <button class="get-code-btn">获取验证码</button>
                    </div>
                </div>

                <div class="remember-row">
                    <input type="checkbox" class="remember-checkbox" id="remember" checked>
                    <label class="remember-label" for="remember">记住登录状态</label>
                </div>

                <button class="login-btn" onclick="location.href='3-大屏-首页.html'">登 录</button>
            </div>

            <a href="1-大屏-系统展示页.html" class="back-link">返回首页</a>
        </div>
    </div>

    <script>
        function switchTab(type) {
            const tabs = document.querySelectorAll('.login-tab');
            const qrLogin = document.getElementById('qr-login');
            const phoneLogin = document.getElementById('phone-login');

            tabs.forEach(tab => tab.classList.remove('active'));

            if (type === 'qr') {
                tabs[0].classList.add('active');
                qrLogin.style.display = 'block';
                phoneLogin.classList.remove('active');
            } else {
                tabs[1].classList.add('active');
                qrLogin.style.display = 'none';
                phoneLogin.classList.add('active');
            }
        }
    </script>
</body>
</html>

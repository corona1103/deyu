<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1440, height=900">
    <title>北大附小AI德育系统 - 管理后台登录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            display: flex;
            width: 1000px;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.25);
        }

        /* 左侧品牌区 */
        .brand-section {
            width: 450px;
            background: linear-gradient(135deg, #8B0000 0%, #A52A2A 100%);
            padding: 60px 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            color: white;
            position: relative;
            overflow: hidden;
        }

        .brand-decoration {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
        }

        .brand-decoration-1 {
            width: 200px;
            height: 200px;
            top: -50px;
            right: -50px;
        }

        .brand-decoration-2 {
            width: 150px;
            height: 150px;
            bottom: -30px;
            left: -30px;
        }

        .brand-logo {
            width: 80px;
            height: 80px;
            background: white;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
        }

        .brand-logo-text {
            color: #8B0000;
            font-size: 20px;
            font-weight: bold;
        }

        .brand-title {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .brand-subtitle {
            font-size: 18px;
            opacity: 0.9;
            margin-bottom: 40px;
        }

        .brand-features {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .feature-item {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 16px;
        }

        .feature-icon {
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        /* 右侧登录区 */
        .login-section {
            flex: 1;
            padding: 60px 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .login-header {
            margin-bottom: 40px;
        }

        .login-title {
            font-size: 28px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }

        .login-subtitle {
            font-size: 16px;
            color: #999;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #333;
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            height: 50px;
            border: 1px solid #E0E0E0;
            border-radius: 10px;
            padding: 0 15px;
            font-size: 16px;
            transition: all 0.3s;
        }

        .form-input:focus {
            outline: none;
            border-color: #8B0000;
            box-shadow: 0 0 0 3px rgba(139, 0, 0, 0.1);
        }

        .input-with-icon {
            position: relative;
        }

        .input-icon {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
            cursor: pointer;
        }

        .form-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #666;
        }

        .remember-me input {
            accent-color: #8B0000;
        }

        .forgot-password {
            font-size: 14px;
            color: #8B0000;
            text-decoration: none;
        }

        .forgot-password:hover {
            text-decoration: underline;
        }

        .login-btn {
            width: 100%;
            height: 50px;
            background: linear-gradient(135deg, #8B0000, #A52A2A);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(139, 0, 0, 0.3);
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 30px 0;
            color: #999;
            font-size: 14px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #E0E0E0;
        }

        .divider::before {
            margin-right: 15px;
        }

        .divider::after {
            margin-left: 15px;
        }

        .other-login {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .other-login-btn {
            width: 50px;
            height: 50px;
            border: 1px solid #E0E0E0;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .other-login-btn:hover {
            border-color: #8B0000;
            background: #FFF5F5;
        }

        .footer-text {
            margin-top: 30px;
            text-align: center;
            font-size: 14px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <!-- 左侧品牌区 -->
        <div class="brand-section">
            <div class="brand-decoration brand-decoration-1"></div>
            <div class="brand-decoration brand-decoration-2"></div>

            <div class="brand-logo">
                <span class="brand-logo-text">北大</span>
            </div>
            <h1 class="brand-title">北大附小AI德育系统</h1>
            <p class="brand-subtitle">智慧德育管理后台</p>

            <div class="brand-features">
                <div class="feature-item">
                    <div class="feature-icon">📊</div>
                    <span>全校德育数据一目了然</span>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">🎯</div>
                    <span>智能预警精准定位问题学生</span>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">📈</div>
                    <span>多维度报表辅助决策</span>
                </div>
            </div>
        </div>

        <!-- 右侧登录区 -->
        <div class="login-section">
            <div class="login-header">
                <h2 class="login-title">管理员登录</h2>
                <p class="login-subtitle">请输入您的账号信息</p>
            </div>

            <form>
                <div class="form-group">
                    <label class="form-label">用户名/手机号</label>
                    <input type="text" class="form-input" placeholder="请输入用户名或手机号">
                </div>

                <div class="form-group">
                    <label class="form-label">密码</label>
                    <div class="input-with-icon">
                        <input type="password" class="form-input" placeholder="请输入密码">
                        <span class="input-icon">👁️</span>
                    </div>
                </div>

                <div class="form-row">
                    <label class="remember-me">
                        <input type="checkbox" checked>
                        <span>记住我</span>
                    </label>
                    <a href="#" class="forgot-password">忘记密码？</a>
                </div>

                <button type="button" class="login-btn" onclick="location.href='16-网页-首页.html'">登 录</button>
            </form>

            <div class="divider">其他登录方式</div>

            <div class="other-login">
                <div class="other-login-btn">📱</div>
                <div class="other-login-btn">💬</div>
            </div>

            <p class="footer-text">
                登录即表示同意《服务协议》和《隐私政策》
            </p>
        </div>
    </div>
</body>
</html>

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies (bigscreen)
        run: cd deyu-bigscreen && npm install

      - name: Install dependencies (tablet)
        run: cd deyu-tablet && npm install

      - name: Install dependencies (shared)
        run: cd packages/shared && npm install

      - name: Build bigscreen
        run: cd deyu-bigscreen && npm run build

      - name: Build tablet
        run: cd deyu-tablet && npm run build

      - name: Prepare deploy directory
        run: |
          mkdir -p deploy/deyu-bigscreen deploy/deyu-tablet
          cp -r deyu-bigscreen/dist/* deploy/deyu-bigscreen/
          cp -r deyu-tablet/dist/* deploy/deyu-tablet/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: deploy

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
